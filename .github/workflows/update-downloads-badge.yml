name: Update downloads badge

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute total downloads and write SVG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # The /releases listing endpoint has a poisoned edge cache that
          # returns an empty array ~80% of the time for this repo. The
          # per-tag endpoint /releases/tags/<tag> uses a separate cache
          # key and is 100% reliable. Strategy: list tags, fetch each
          # release individually, sum download counts.
          AUTH="Authorization: Bearer $GH_TOKEN"
          API="https://api.github.com/repos/$REPO"

          TAGS=$(curl -sfH "$AUTH" "$API/tags?per_page=100" | jq -r '.[].name')
          echo "tags discovered: $(echo "$TAGS" | tr '\n' ' ')"

          TOTAL=0
          for tag in $TAGS; do
            DL=$(curl -sH "$AUTH" "$API/releases/tags/$tag" \
              | jq '[.assets[]?.download_count] | add // 0' 2>/dev/null || echo 0)
            DL=${DL:-0}
            echo "  $tag: $DL"
            TOTAL=$((TOTAL + DL))
          done
          echo "total downloads: $TOTAL"

          PREV=0
          if [ -f assets/downloads.svg ]; then
            PREV=$(grep -oE '<title>downloads: [0-9]+' assets/downloads.svg | grep -oE '[0-9]+$' | head -n1)
            PREV=${PREV:-0}
          fi
          echo "previous SVG value: $PREV"

          if [ "$TOTAL" -lt "$PREV" ]; then
            echo "computed $TOTAL but previous was $PREV — keeping previous SVG"
            exit 0
          fi

          mkdir -p assets
          curl -sfL "https://img.shields.io/badge/downloads-${TOTAL}-brightgreen?style=flat-square" \
            -o assets/downloads.svg

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/downloads.svg
          if git diff --cached --quiet; then
            echo "no change"
          else
            git commit -m "chore: refresh downloads badge"
            git push origin HEAD:main
          fi
